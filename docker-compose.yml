services:
  mosquitto:
    image: docker.arvancloud.ir/eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: always
    networks:
      - iot-net

  influxdb:
    image: docker.arvancloud.ir/influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=MohammadOrg
      - DOCKER_INFLUXDB_INIT_BUCKET=FactoryMetrics
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=SuperToken123456
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: always
    networks:
      - iot-net

  nodered:
    image: docker.arvancloud.ir/nodered/node-red:latest
    container_name: nodered
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    environment:
      - TZ=UTC
    restart: always
    networks:
      - iot-net
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_healthy

networks:
  iot-net:
    driver: bridge

volumes:
  influxdb-data:
  influxdb-config:
